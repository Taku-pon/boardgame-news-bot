name: Post Board Game News

on:
  schedule:
    # UTC基準。日本時間 9:00 / 13:00 / 18:00 頃に実行(3回×最大4件で1日最大12件)
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_news.py

      - name: Commit updated seen_ids.json
        run: |
          git config user.name "boardgame-news-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "update seen_ids.json"
          git push
